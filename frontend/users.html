<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, height=device-height, viewport-fit=cover">
    <title>إدارة المستخدمين | PURE Survey 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #C4E2F5 0%, #E8F4FD 100%);
            min-height: 100vh;
        }
        
        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(75, 184, 250, 0.06);
            animation: floatBg 25s infinite;
        }
        
        @keyframes floatBg {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            25% { transform: translate(50px, -50px) scale(1.2); opacity: 0.5; }
            50% { transform: translate(-40px, 40px) scale(0.85); opacity: 0.4; }
            75% { transform: translate(40px, 50px) scale(1.1); opacity: 0.45; }
        }
        
        /* Header */
        .header {
            background: rgba(44, 94, 173, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        
        /* Stats Cards */
        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 1.25rem;
            border: 1px solid rgba(196, 226, 245, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .stat-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 35px -15px rgba(44, 94, 173, 0.25);
            border-color: #4BB8FA;
        }
        
        /* User Card */
        .user-card {
            background: white;
            border-radius: 1.25rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #E2E8F0;
            overflow: hidden;
            position: relative;
        }
        
        .user-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #2C5EAD, #4BB8FA);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s ease;
        }
        
        .user-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 35px -12px rgba(44, 94, 173, 0.2);
            border-color: #C4E2F5;
        }
        
        .user-card:hover::before {
            transform: scaleX(1);
        }
        
        /* Role Badges */
        .role-admin {
            background: linear-gradient(135deg, #2C5EAD, #1591DC);
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 700;
        }
        
        .role-researcher {
            background: linear-gradient(135deg, #059669, #047857);
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 700;
        }
        
        .role-user {
            background: linear-gradient(135deg, #7C3AED, #6D28D9);
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 700;
        }
        
        /* Status Badge */
        .status-active {
            background: #C4E2F5;
            color: #2C5EAD;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 600;
        }
        
        .status-inactive {
            background: #FEE2E2;
            color: #DC2626;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 600;
        }
        
        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, #2C5EAD, #1591DC);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -6px rgba(44, 94, 173, 0.5);
        }
        
        .btn-outline {
            border: 1.5px solid #1591DC;
            color: #1591DC;
            background: white;
            transition: all 0.3s ease;
        }
        
        .btn-outline:hover {
            background: linear-gradient(135deg, #2C5EAD, #1591DC);
            color: white;
            border-color: transparent;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #DC2626, #B91C1C);
            transition: all 0.3s ease;
        }
        
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -6px rgba(220, 38, 38, 0.5);
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active { display: flex; }
        
        .modal-content {
            background: white;
            border-radius: 1.5rem;
            max-width: 450px;
            width: 90%;
            animation: modalSlide 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes modalSlide {
            from { opacity: 0; transform: scale(0.95) translateY(-20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        /* Select Dropdown */
        .role-select {
            background: #F1F5F9;
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .role-select:hover {
            background: #E2E8F0;
        }
        
        .role-select:focus {
            outline: none;
            ring: 2px solid #4BB8FA;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            top: 90px;
            left: 20px;
            z-index: 1100;
            animation: slideRight 0.3s ease-out;
        }
        
        @keyframes slideRight {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        /* Loading */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Search Input */
        .search-input {
            transition: all 0.3s;
            border: 1px solid #E2E8F0;
        }
        
        .search-input:focus {
            border-color: #4BB8FA;
            box-shadow: 0 0 0 3px rgba(75, 184, 250, 0.15);
            outline: none;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #C4E2F5; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #2C5EAD, #1591DC); border-radius: 10px; }
        
        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in-up {
            animation: fadeInUp 0.4s ease-out forwards;
        }
        
        /* Avatar */
        .user-avatar {
            background: linear-gradient(135deg, #C4E2F5, #E8F4FD);
            width: 48px;
            height: 48px;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* View Toggle */
        .view-toggle {
            background: #F1F5F9;
            border-radius: 12px;
            padding: 3px;
        }
        
        .view-toggle button {
            padding: 6px 14px;
            border-radius: 10px;
            transition: all 0.2s;
        }
        
        .view-toggle button.active {
            background: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        /* Skeleton Loading */
.skeleton {
    background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
    background-size: 200% 100%;
    animation: skeleton-loading 1.5s infinite;
    border-radius: 12px;
}

@keyframes skeleton-loading {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

.skeleton-title { height: 24px; width: 60%; margin-bottom: 12px; }
.skeleton-text { height: 16px; margin: 8px 0; }
.skeleton-avatar { width: 48px; height: 48px; border-radius: 1rem; }
.skeleton-button { height: 36px; width: 80px; border-radius: 30px; }

    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation" id="bgAnimation"></div>
    
    <!-- Header -->
    <header class="header text-white">
        <div class="container mx-auto px-6 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center backdrop-blur-sm">
                        <i class="fas fa-chart-line text-white text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold tracking-tight">PURE Survey</h1>
                        <p class="text-xs text-white/70">إدارة المستخدمين</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2 bg-white/10 backdrop-blur-sm px-3 py-1.5 rounded-lg">
                        <i class="fas fa-user-shield text-sm"></i>
                        <span class="text-sm" id="adminName">Admin</span>
                    </div>
                    <button onclick="location.href='admin.html'" class="bg-white/10 hover:bg-white/20 backdrop-blur-sm px-3 py-1.5 rounded-lg text-sm transition">
                        <i class="fas fa-arrow-right ml-1"></i> لوحة التحكم
                    </button>
                </div>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="relative z-10 container mx-auto px-6 py-8">
        <!-- Stats Cards -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 mb-8 fade-in-up">
            <div class="stat-card p-5 text-center">
                <div class="w-14 h-14 bg-gradient-to-br from-blue-100 to-blue-200 rounded-2xl flex items-center justify-center mx-auto mb-3">
                    <i class="fas fa-users text-[#2C5EAD] text-2xl"></i>
                </div>
                <p class="text-3xl font-bold text-gray-800" id="totalUsers">0</p>
                <p class="text-sm text-gray-500 mt-1">إجمالي المستخدمين</p>
            </div>
            <div class="stat-card p-5 text-center">
                <div class="w-14 h-14 bg-gradient-to-br from-green-100 to-green-200 rounded-2xl flex items-center justify-center mx-auto mb-3">
                    <i class="fas fa-user-shield text-[#1591DC] text-2xl"></i>
                </div>
                <p class="text-3xl font-bold text-gray-800" id="adminCount">0</p>
                <p class="text-sm text-gray-500 mt-1">مديرين</p>
            </div>
            <div class="stat-card p-5 text-center">
                <div class="w-14 h-14 bg-gradient-to-br from-yellow-100 to-yellow-200 rounded-2xl flex items-center justify-center mx-auto mb-3">
                    <i class="fas fa-microscope text-[#D97706] text-2xl"></i>
                </div>
                <p class="text-3xl font-bold text-gray-800" id="researcherCount">0</p>
                <p class="text-sm text-gray-500 mt-1">باحثين</p>
            </div>
            <div class="stat-card p-5 text-center">
                <div class="w-14 h-14 bg-gradient-to-br from-purple-100 to-purple-200 rounded-2xl flex items-center justify-center mx-auto mb-3">
                    <i class="fas fa-user text-[#4BB8FA] text-2xl"></i>
                </div>
                <p class="text-3xl font-bold text-gray-800" id="userCount">0</p>
                <p class="text-sm text-gray-500 mt-1">مستخدمين عاديين</p>
            </div>
        </div>
        
        <!-- Actions Bar -->
        <div class="bg-white/90 backdrop-blur-sm rounded-2xl p-4 mb-8 flex flex-wrap justify-between items-center gap-4 fade-in-up shadow-sm border border-white/50" style="animation-delay: 0.1s">
            <div class="flex gap-3">
                <button onclick="refreshData()" class="btn-outline px-4 py-2.5 rounded-xl text-sm">
                    <i class="fas fa-sync-alt ml-2"></i> تحديث
                </button>
            </div>
            <div class="flex gap-3 items-center">
                <div class="view-toggle flex">
                    <button onclick="setView('grid')" id="gridViewBtn" class="active">
                        <i class="fas fa-th-large"></i>
                    </button>
                    <button onclick="setView('list')" id="listViewBtn">
                        <i class="fas fa-list"></i>
                    </button>
                </div>
                <div class="relative">
                    <i class="fas fa-search absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                    <input type="text" id="searchInput" placeholder="بحث عن مستخدم..." class="search-input pr-9 pl-4 py-2 border border-gray-200 rounded-xl text-sm w-64 bg-white/80 focus:bg-white transition">
                </div>
            </div>
        </div>
        
        <!-- Users Container (Grid View) -->
        <div id="usersContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 fade-in-up" style="animation-delay: 0.2s">
            <div class="col-span-full text-center py-12">
                <div class="spinner mx-auto"></div>
                <p class="text-gray-500 mt-3">جاري تحميل المستخدمين...</p>
            </div>
        </div>
        
        <!-- Empty State -->
        <div id="emptyState" class="text-center py-16 hidden fade-in-up">
            <div class="w-28 h-28 bg-gradient-to-br from-gray-100 to-gray-200 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-users-slash text-gray-400 text-5xl"></i>
            </div>
            <h3 class="text-xl font-bold text-gray-700 mb-2">لا توجد مستخدمين</h3>
            <p class="text-gray-500">قم بدعوة مستخدمين جدد للانضمام إلى المنصة</p>
        </div>
    </main>
    
    <!-- Delete Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content p-6 text-center">
            <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-trash-alt text-red-600 text-2xl"></i>
            </div>
            <h3 class="text-xl font-bold text-gray-800 mb-2">تأكيد الحذف</h3>
            <p class="text-gray-600 mb-6" id="deleteMessage">هل أنت متأكد من حذف هذا المستخدم؟ لا يمكن التراجع عن هذا الإجراء.</p>
            <div class="flex gap-3 justify-center">
                <button onclick="closeModal()" class="px-5 py-2 border border-gray-300 rounded-xl text-gray-700 hover:bg-gray-50 transition">إلغاء</button>
                <button id="confirmDeleteBtn" class="px-5 py-2 bg-red-600 text-white rounded-xl hover:bg-red-700 transition">حذف</button>
            </div>
        </div>
    </div>
    
    <script src="js/api.js"></script>
    <script>
        let allUsers = [];
        let currentDeleteId = null;
        let currentView = 'grid';
        
        // Background animation
        function createBackgroundCircles() {
            const container = document.getElementById('bgAnimation');
            for (let i = 0; i < 25; i++) {
                const circle = document.createElement('div');
                circle.classList.add('bg-circle');
                const size = Math.random() * 280 + 80;
                circle.style.width = size + 'px';
                circle.style.height = size + 'px';
                circle.style.left = Math.random() * 100 + '%';
                circle.style.top = Math.random() * 100 + '%';
                circle.style.animationDelay = Math.random() * 25 + 's';
                circle.style.animationDuration = Math.random() * 22 + 12 + 's';
                container.appendChild(circle);
            }
        }
        createBackgroundCircles();
        
        function showToast(text, isSuccess) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            const bgColor = isSuccess ? '#10B981' : '#EF4444';
            toast.innerHTML = `
                <div class="flex items-center gap-3 bg-white rounded-xl shadow-lg p-3 border-r-4" style="border-right-color: ${bgColor}">
                    <i class="fas ${isSuccess ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
                    <span class="text-gray-700 text-sm">${text}</span>
                </div>
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function getRoleBadge(role) {
            if (role === 'admin') {
                return '<span class="role-admin"><i class="fas fa-crown ml-1 text-xs"></i> مدير</span>';
            } else if (role === 'researcher') {
                return '<span class="role-researcher"><i class="fas fa-microscope ml-1 text-xs"></i> باحث</span>';
            } else {
                return '<span class="role-user"><i class="fas fa-user ml-1 text-xs"></i> مستخدم</span>';
            }
        }
        
        function getRoleClass(role) {
            if (role === 'admin') return 'role-admin';
            if (role === 'researcher') return 'role-researcher';
            return 'role-user';
        }
        
        function renderGrid(users) {
            if (!users || users.length === 0) {
                document.getElementById('usersContainer').innerHTML = '';
                document.getElementById('emptyState').classList.remove('hidden');
                return;
            }
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('usersContainer').innerHTML = users.map(user => `
                <div class="user-card fade-in-up">
                    <div class="p-5">
                        <div class="flex items-start justify-between mb-4">
                            <div class="flex items-center gap-3">
                                <div class="user-avatar">
                                    <i class="fas fa-user text-[#2C5EAD] text-xl"></i>
                                </div>
                                <div>
                                    <h3 class="font-bold text-gray-800 text-lg">${escapeHtml(user.name)}</h3>
                                    <p class="text-sm text-gray-500">${escapeHtml(user.email)}</p>
                                </div>
                            </div>
                            ${getRoleBadge(user.role)}
                        </div>
                        
                        <div class="flex items-center justify-between mb-4">
                            <div class="flex items-center gap-2 text-sm text-gray-500">
                                <i class="far fa-calendar-alt"></i>
                                <span>${new Date(user.created_at).toLocaleDateString('ar-EG')}</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <select onchange="changeRole(${user.id}, this.value)" class="role-select">
                                    <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>👑 مدير</option>
                                    <option value="researcher" ${user.role === 'researcher' ? 'selected' : ''}>🔬 باحث</option>
                                    <option value="user" ${user.role === 'user' ? 'selected' : ''}>👤 مستخدم</option>
                                </select>
                                ${user.id !== 1 ? `<button onclick="deleteUser(${user.id})" class="text-red-500 hover:text-red-700 px-2"><i class="fas fa-trash-alt"></i></button>` : '<span class="text-gray-400 text-xs">(رئيسي)</span>'}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderList(users) {
            if (!users || users.length === 0) {
                document.getElementById('usersContainer').innerHTML = '';
                document.getElementById('emptyState').classList.remove('hidden');
                return;
            }
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('usersContainer').innerHTML = `
                <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100">
                    <table class="w-full">
                        <thead class="bg-gradient-to-r from-[#C4E2F5] to-[#E8F4FD]">
                            <tr>
                                <th class="p-3 text-right text-sm font-semibold text-[#2C5EAD]">#</th>
                                <th class="p-3 text-right text-sm font-semibold text-[#2C5EAD]">الاسم</th>
                                <th class="p-3 text-right text-sm font-semibold text-[#2C5EAD]">البريد الإلكتروني</th>
                                <th class="p-3 text-right text-sm font-semibold text-[#2C5EAD]">الدور</th>
                                <th class="p-3 text-right text-sm font-semibold text-[#2C5EAD]">تاريخ التسجيل</th>
                                <th class="p-3 text-right text-sm font-semibold text-[#2C5EAD]">إجراءات</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${users.map(user => `
                                <tr class="border-b border-gray-100 hover:bg-gray-50 transition">
                                    <td class="p-3 text-sm font-mono">${user.id}</td>
                                    <td class="p-3 text-sm font-medium">${escapeHtml(user.name)}</td>
                                    <td class="p-3 text-sm text-gray-600">${escapeHtml(user.email)}</td>
                                    <td class="p-3">
                                        <select onchange="changeRole(${user.id}, this.value)" class="role-select ${getRoleClass(user.role)}">
                                            <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>👑 مدير</option>
                                            <option value="researcher" ${user.role === 'researcher' ? 'selected' : ''}>🔬 باحث</option>
                                            <option value="user" ${user.role === 'user' ? 'selected' : ''}>👤 مستخدم</option>
                                        </select>
                                    </td>
                                    <td class="p-3 text-sm text-gray-500">${new Date(user.created_at).toLocaleDateString('ar-EG')}</td>
                                    <td class="p-3">
                                        <div class="flex gap-2">
                                            ${user.id !== 1 ? `<button onclick="deleteUser(${user.id})" class="text-red-500 hover:text-red-700"><i class="fas fa-trash-alt"></i></button>` : '<span class="text-gray-400 text-xs">لا يمكن الحذف</span>'}
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }
        
        function renderUsers(users) {
            if (currentView === 'grid') {
                renderGrid(users);
            } else {
                renderList(users);
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return String(text).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        async function loadUsers() {
            showSkeletonLoading();
            try {
                const users = await api('/users');
                allUsers = users;
                
                const total = users.length;
                const admins = users.filter(u => u.role === 'admin').length;
                const researchers = users.filter(u => u.role === 'researcher').length;
                const regularUsers = users.filter(u => u.role === 'user').length;
                
                document.getElementById('totalUsers').textContent = total;
                document.getElementById('adminCount').textContent = admins;
                document.getElementById('researcherCount').textContent = researchers;
                document.getElementById('userCount').textContent = regularUsers;
                
                renderUsers(users);
                
                const currentUser = user();
                if (currentUser) document.getElementById('adminName').textContent = currentUser.name || 'Admin';
            } catch (error) {
                console.error('Error loading users:', error);
                document.getElementById('usersContainer').innerHTML = '<div class="col-span-full text-center py-12 text-red-500">حدث خطأ في تحميل البيانات</div>';
            }
        }
        
async function changeRole(id, role) {
    const confirmed = confirm(`هل أنت متأكد من تغيير دور هذا المستخدم إلى ${role === 'admin' ? 'مدير' : (role === 'researcher' ? 'باحث' : 'مستخدم عادي')}؟`);
    if (!confirmed) {
        loadUsers(); // إعادة تحميل لاستعادة القيمة القديمة
        return;
    }
    
    try {
        await api('/users/' + id + '/role', {
            method: 'PUT',
            body: JSON.stringify({ role: role })
        });
        showToast('✓ تم تحديث دور المستخدم بنجاح', true);
        loadUsers();
    } catch (error) {
        showToast('✗ فشل تحديث الدور: ' + error.message, false);
    }
}
        
        function deleteUser(id) {
            const user = allUsers.find(u => u.id === id);
            currentDeleteId = id;
            document.getElementById('deleteMessage').innerHTML = `هل أنت متأكد من حذف "${user?.name || 'هذا المستخدم'}"؟ لا يمكن التراجع عن هذا الإجراء.`;
            document.getElementById('deleteModal').classList.add('active');
            document.getElementById('confirmDeleteBtn').onclick = async () => {
                try {
                    await api('/users/' + id, { method: 'DELETE' });
                    showToast('✓ تم حذف المستخدم بنجاح', true);
                    closeModal();
                    loadUsers();
                } catch (error) {
                    showToast('✗ فشل الحذف: ' + error.message, false);
                }
            };
        }
        
        function setView(view) {
            currentView = view;
            const gridBtn = document.getElementById('gridViewBtn');
            const listBtn = document.getElementById('listViewBtn');
            if (view === 'grid') {
                gridBtn.classList.add('active');
                listBtn.classList.remove('active');
            } else {
                listBtn.classList.add('active');
                gridBtn.classList.remove('active');
            }
            renderUsers(allUsers);
        }
        
document.getElementById('searchInput').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    
    if (!term) {
        renderUsers(allUsers);
        return;
    }
    
    const filtered = allUsers.filter(u => 
        (u.name && u.name.toLowerCase().includes(term)) ||
        (u.email && u.email.toLowerCase().includes(term))
    );
    
    // ✅ عرض رسالة إذا لم توجد نتائج
    if (filtered.length === 0) {
        document.getElementById('usersContainer').innerHTML = `
            <div class="col-span-full text-center py-12">
                <i class="fas fa-search text-4xl text-gray-300 mb-2"></i>
                <p class="text-gray-500">لا توجد نتائج مطابقة للبحث</p>
            </div>
        `;
        return;
    }
    
    renderUsers(filtered);
});
        
        function refreshData() { showToast('جاري تحديث البيانات...', true); loadUsers(); }
        function closeModal() { document.getElementById('deleteModal').classList.remove('active'); }
        
        // Check admin role without redirect
        const currentUser = user();
        if (!currentUser || currentUser.role !== 'admin') {
            console.log('الرجاء تسجيل الدخول كمدير للوصول إلى هذه الصفحة');
            if (!currentUser) {
                sessionStorage.setItem('redirectAfterLogin', window.location.pathname);
                setTimeout(() => { window.location.href = 'index.html'; }, 2000);
            } else {
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
            }
        } else {
            loadUsers();
        }

        function showSkeletonLoading() {
    document.getElementById('usersContainer').innerHTML = `
        <div class="col-span-full">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                ${Array(6).fill(0).map(() => `
                    <div class="bg-white rounded-xl p-5">
                        <div class="flex items-start justify-between mb-4">
                            <div class="flex items-center gap-3">
                                <div class="skeleton skeleton-avatar"></div>
                                <div>
                                    <div class="skeleton skeleton-title w-32"></div>
                                    <div class="skeleton skeleton-text w-40 mt-2"></div>
                                </div>
                            </div>
                            <div class="skeleton skeleton-button"></div>
                        </div>
                        <div class="flex justify-between mt-4">
                            <div class="skeleton skeleton-text w-24"></div>
                            <div class="skeleton skeleton-button w-20"></div>
                        </div>
                    </div>
                `).join('')}
            </div>
        </div>
    `;
}

    </script>
</body>
</html>
