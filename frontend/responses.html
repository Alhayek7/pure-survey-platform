<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, height=device-height, viewport-fit=cover">
    <title>عرض الردود | PURE Survey 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #C4E2F5 0%, #E8F4FD 100%);
            min-height: 100vh;
        }
        
        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(75, 184, 250, 0.06);
            animation: floatBg 25s infinite;
        }
        
        @keyframes floatBg {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            25% { transform: translate(50px, -50px) scale(1.2); opacity: 0.5; }
            50% { transform: translate(-40px, 40px) scale(0.85); opacity: 0.4; }
            75% { transform: translate(40px, 50px) scale(1.1); opacity: 0.45; }
        }
        
        /* Header */
        .header {
            background: rgba(44, 94, 173, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        
        /* Cards */
        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 1.25rem;
            border: 1px solid rgba(196, 226, 245, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 35px -15px rgba(44, 94, 173, 0.25);
        }
        
        /* Response Card */
        .response-card {
            background: white;
            border-radius: 1.25rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #E2E8F0;
            overflow: hidden;
        }
        
        .response-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px -12px rgba(44, 94, 173, 0.15);
            border-color: #C4E2F5;
        }
        
        /* Sentiment Badges */
        .sentiment-positive {
            background: #C4E2F5;
            color: #2C5EAD;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        .sentiment-negative {
            background: #FEE2E2;
            color: #DC2626;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        .sentiment-neutral {
            background: #FEF3C7;
            color: #D97706;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, #2C5EAD, #1591DC);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -6px rgba(44, 94, 173, 0.5);
        }
        
        .btn-outline {
            border: 1.5px solid #1591DC;
            color: #1591DC;
            background: white;
            transition: all 0.3s ease;
        }
        
        .btn-outline:hover {
            background: linear-gradient(135deg, #2C5EAD, #1591DC);
            color: white;
            border-color: transparent;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active { display: flex; }
        
        .modal-content {
            background: white;
            border-radius: 1.5rem;
            max-width: 500px;
            width: 90%;
            animation: modalSlide 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes modalSlide {
            from { opacity: 0; transform: scale(0.95) translateY(-20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        /* Toast */
        .toast {
            position: fixed;
            top: 90px;
            left: 20px;
            z-index: 1100;
            animation: slideRight 0.3s ease-out;
        }
        
        @keyframes slideRight {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        /* Loading */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Search */
        .search-input {
            transition: all 0.3s;
            border: 1px solid #E2E8F0;
        }
        
        .search-input:focus {
            border-color: #4BB8FA;
            box-shadow: 0 0 0 3px rgba(75, 184, 250, 0.15);
            outline: none;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #C4E2F5; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #2C5EAD, #1591DC); border-radius: 10px; }
        
        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in-up {
            animation: fadeInUp 0.4s ease-out forwards;
        }
        
        /* Answer Item */
        .answer-item {
            background: #F8FAFE;
            border-radius: 0.75rem;
            padding: 10px 14px;
            margin-bottom: 8px;
        }
        
        /* Survey Select Card */
        .survey-select-card {
            background: white;
            border-radius: 1.25rem;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .survey-select-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px -10px rgba(44,94,173,0.2);
        }
        
        .survey-select-card.selected {
            border-color: #1591DC;
            background: linear-gradient(135deg, #F8FAFE, #FFFFFF);
        }
        
        /* Export Button */
        .export-btn {
            background: linear-gradient(135deg, #059669, #047857);
            transition: all 0.3s;
        }
        
        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -6px rgba(5, 150, 105, 0.5);
        }

        /* Skeleton Loading */
.skeleton {
    background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
    background-size: 200% 100%;
    animation: skeleton-loading 1.5s infinite;
    border-radius: 12px;
}

@keyframes skeleton-loading {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

.skeleton-title { height: 24px; width: 60%; margin-bottom: 12px; }
.skeleton-text { height: 16px; margin: 8px 0; }
.skeleton-card { padding: 20px; border-radius: 20px; }
.skeleton-button { height: 36px; width: 100px; border-radius: 10px; }
.skeleton-avatar { width: 40px; height: 40px; border-radius: 12px; }

    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation" id="bgAnimation"></div>
    
    <!-- Header -->
    <header class="header text-white">
        <div class="container mx-auto px-6 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center backdrop-blur-sm">
                        <i class="fas fa-chart-line text-white text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold tracking-tight">PURE Survey</h1>
                        <p class="text-xs text-white/70">عرض الردود وتحليلها</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2 bg-white/10 backdrop-blur-sm px-3 py-1.5 rounded-lg">
                        <i class="fas fa-user-shield text-sm"></i>
                        <span class="text-sm" id="adminName">Admin</span>
                    </div>
                    <button onclick="location.href='admin_surveys.html'" class="bg-white/10 hover:bg-white/20 backdrop-blur-sm px-3 py-1.5 rounded-lg text-sm transition">
                        <i class="fas fa-arrow-right ml-1"></i> الاستبيانات
                    </button>
                </div>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="relative z-10 container mx-auto px-6 py-8">
        <!-- Survey Selection -->
        <div class="mb-8 fade-in-up">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                    <i class="fas fa-poll text-[#2C5EAD]"></i>
                    اختيار الاستبيان
                </h2>
                <div class="relative">
                    <i class="fas fa-search absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                    <input type="text" id="surveySearchInput" placeholder="بحث عن استبيان..." class="search-input pr-9 pl-4 py-2 border border-gray-200 rounded-xl text-sm w-64 bg-white/80">
                </div>
            </div>
            <div id="surveysList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="col-span-full text-center py-8">
                    <div class="spinner mx-auto"></div>
                    <p class="text-gray-500 mt-2">جاري تحميل الاستبيانات...</p>
                </div>
            </div>
        </div>
        
        <!-- Selected Survey Info -->
        <div id="selectedSurveyInfo" class="hidden mb-6 fade-in-up"></div>
        
        <!-- AI Sentiment Analysis Card -->
        <div id="sentimentCard" class="hidden bg-gradient-to-r from-purple-50 to-indigo-50 rounded-2xl p-5 mb-6 fade-in-up border border-purple-100"></div>
        
        <!-- Stats Cards -->
        <div id="statsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 mb-8 hidden fade-in-up"></div>
        
        <!-- Actions Bar with Refresh Button -->
<div class="bg-white/90 backdrop-blur-sm rounded-2xl p-4 mb-6 flex justify-end items-center gap-4 fade-in-up shadow-sm border border-white/50">
    <button onclick="refreshData()" class="btn-outline px-4 py-2.5 rounded-xl text-sm">
        <i class="fas fa-sync-alt ml-2"></i> تحديث البيانات
    </button>
</div>

        <!-- Responses Container -->
        <div id="responsesContainer" class="space-y-4 fade-in-up"></div>
        
        <!-- Empty State -->
        <div id="emptyState" class="text-center py-16 hidden fade-in-up">
            <div class="w-28 h-28 bg-gradient-to-br from-gray-100 to-gray-200 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-inbox text-gray-400 text-5xl"></i>
            </div>
            <h3 class="text-xl font-bold text-gray-700 mb-2">لا توجد ردود</h3>
            <p class="text-gray-500">لم يتم استلام أي ردود على هذا الاستبيان بعد</p>
        </div>
        
        <!-- Loading State -->
        <div id="loadingState" class="text-center py-12 hidden">
            <div class="spinner mx-auto"></div>
            <p class="text-gray-500 mt-3">جاري تحميل الردود...</p>
        </div>
    </main>
    
    <!-- Response Detail Modal -->
    <div id="responseModal" class="modal">
        <div class="modal-content p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-gray-800">تفاصيل الرد</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div id="modalContent"></div>
            <div class="mt-4 flex justify-end">
                <button onclick="closeModal()" class="btn-outline px-4 py-2 rounded-lg">إغلاق</button>
            </div>
        </div>
    </div>
    
    <script src="js/api.js"></script>
    <script>
        let allSurveys = [];
        let currentSurveyId = null;
        let currentResponses = [];
        let sentimentChart = null;
        
        // Background animation
        function createBackgroundCircles() {
            const container = document.getElementById('bgAnimation');
            for (let i = 0; i < 25; i++) {
                const circle = document.createElement('div');
                circle.classList.add('bg-circle');
                const size = Math.random() * 280 + 80;
                circle.style.width = size + 'px';
                circle.style.height = size + 'px';
                circle.style.left = Math.random() * 100 + '%';
                circle.style.top = Math.random() * 100 + '%';
                circle.style.animationDelay = Math.random() * 25 + 's';
                circle.style.animationDuration = Math.random() * 22 + 12 + 's';
                container.appendChild(circle);
            }
        }
        createBackgroundCircles();
        
        function showToast(text, isSuccess) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            const bgColor = isSuccess ? '#10B981' : '#EF4444';
            toast.innerHTML = `<div class="flex items-center gap-3 bg-white rounded-xl shadow-lg p-3 border-r-4" style="border-right-color: ${bgColor}"><i class="fas ${isSuccess ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i><span class="text-gray-700 text-sm">${text}</span></div>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return String(text).replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
        }
        
        function getSentimentBadge(score) {
            if (score > 0.2) return '<span class="sentiment-positive"><i class="fas fa-smile-wink ml-1"></i> إيجابي</span>';
            if (score < -0.2) return '<span class="sentiment-negative"><i class="fas fa-frown ml-1"></i> سلبي</span>';
            return '<span class="sentiment-neutral"><i class="fas fa-meh ml-1"></i> محايد</span>';
        }
        
        // Load surveys
async function loadSurveys() {
    showSkeletonLoading();  // ✅ إضافة Skeleton Loading
    
    try {
        const surveys = await api('/surveys');
        allSurveys = surveys;
        renderSurveysList(surveys);
    } catch (error) {
        document.getElementById('surveysList').innerHTML = '<div class="col-span-full text-center py-8 text-red-500">فشل في تحميل الاستبيانات</div>';
    }
}
        
function renderSurveysList(surveys) {
    const container = document.getElementById('surveysList');
    if (!surveys || surveys.length === 0) {
        container.innerHTML = '<div class="col-span-full text-center py-8 text-gray-500">لا توجد استبيانات</div>';
        return;
    }
    
    // إذا كان هناك مصطلح بحث ولم توجد نتائج
    const searchTerm = document.getElementById('surveySearchInput').value.toLowerCase();
    if (searchTerm && surveys.length === 0) {
        container.innerHTML = `
            <div class="col-span-full text-center py-12">
                <i class="fas fa-search text-4xl text-gray-300 mb-2"></i>
                <p class="text-gray-500">لا توجد نتائج مطابقة للبحث</p>
            </div>
        `;
        return;
    }
    
    container.innerHTML = surveys.map(survey => `
        <div class="survey-select-card p-4 ${currentSurveyId === survey.id ? 'selected' : ''}" onclick="selectSurvey(${survey.id})">
            <div class="flex items-center gap-3 mb-2">
                <div class="w-10 h-10 bg-gradient-to-br from-[#C4E2F5] to-[#E8F4FD] rounded-xl flex items-center justify-center">
                    <i class="fas fa-poll text-[#2C5EAD] text-lg"></i>
                </div>
                <div>
                    <h3 class="font-bold text-gray-800">${escapeHtml(survey.title || 'بدون عنوان')}</h3>
                    <p class="text-xs text-gray-500">${survey.responses?.length || 0} ردود</p>
                </div>
            </div>
        </div>
    `).join('');
}
        
        // Select survey and load responses
        async function selectSurvey(surveyId) {
            currentSurveyId = surveyId;
            renderSurveysList(allSurveys);
            
            document.getElementById('selectedSurveyInfo').classList.remove('hidden');
            document.getElementById('selectedSurveyInfo').innerHTML = `
                <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                    <div class="flex justify-between items-center">
                        <div>
                            <h2 class="text-xl font-bold text-gray-800">${escapeHtml(allSurveys.find(s => s.id === surveyId)?.title || 'استبيان')}</h2>
                            <p class="text-gray-500 text-sm mt-1">${escapeHtml(allSurveys.find(s => s.id === surveyId)?.description || 'لا يوجد وصف')}</p>
                        </div>
                        <button onclick="exportResponses()" class="export-btn text-white px-4 py-2 rounded-lg text-sm">
                            <i class="fas fa-file-excel ml-1"></i> تصدير
                        </button>
                    </div>
                </div>
            `;
            
            await loadResponses(surveyId);
        }
        
        // Load responses for selected survey
        async function loadResponses(surveyId) {
            const loadingState = document.getElementById('loadingState');
            const responsesContainer = document.getElementById('responsesContainer');
            const statsContainer = document.getElementById('statsContainer');
            const emptyState = document.getElementById('emptyState');
            const sentimentCard = document.getElementById('sentimentCard');
            
            loadingState.classList.remove('hidden');
            responsesContainer.innerHTML = '';
            statsContainer.classList.add('hidden');
            emptyState.classList.add('hidden');
            sentimentCard.classList.add('hidden');
            
            try {
                const responses = await api(`/responses/survey/${surveyId}`);
                currentResponses = responses;
                loadingState.classList.add('hidden');
                
                if (!responses || responses.length === 0) {
                    emptyState.classList.remove('hidden');
                    return;
                }
                
                // Update stats
                statsContainer.classList.remove('hidden');
                statsContainer.innerHTML = `
                    <div class="stat-card p-4 text-center"><div class="text-2xl font-bold text-[#2C5EAD]">${responses.length}</div><div class="text-sm text-gray-500">إجمالي الردود</div></div>
                    <div class="stat-card p-4 text-center"><div class="text-2xl font-bold text-[#1591DC]">${new Date().toLocaleDateString('ar-EG')}</div><div class="text-sm text-gray-500">آخر تحديث</div></div>
                    <div class="stat-card p-4 text-center"><div class="text-2xl font-bold text-[#4BB8FA]">${responses.length}</div><div class="text-sm text-gray-500">مشارك</div></div>
                    <div class="stat-card p-4 text-center"><div class="text-2xl font-bold text-green-600">100%</div><div class="text-sm text-gray-500">نسبة الإكمال</div></div>
                `;
                
                // Analyze sentiments
                await analyzeSentiments(responses);
                
                // Render responses
                renderResponses(responses);
            } catch (error) {
                loadingState.classList.add('hidden');
                responsesContainer.innerHTML = '<div class="text-center py-8 text-red-500">فشل في تحميل الردود</div>';
            }
        }
        
        // Analyze sentiments using AI
async function analyzeSentiments(responses) {
    // جمع النصوص للتحليل
    const texts = [];
    for (const response of responses) {
        for (const answer of response.answers || []) {
            if (answer.answer_value && typeof answer.answer_value === 'string' && answer.answer_value.length > 5) {
                texts.push({
                    id: response.id,
                    text: answer.answer_value.substring(0, 200),
                    question_id: answer.question_id
                });
            }
        }
    }
    
    if (texts.length === 0) return;
    
    try {
        const result = await api('/analytics/batch-sentiment', {
            method: 'POST',
            body: JSON.stringify({ responses: texts })
        });
        
        if (result.success && result.data) {
            const summary = result.data.summary;
            const positive = summary.positive || 0;
            const negative = summary.negative || 0;
            const neutral = summary.neutral || 0;
            const total = positive + negative + neutral;
            
            const positivePercent = total > 0 ? (positive / total * 100).toFixed(1) : 0;
            const negativePercent = total > 0 ? (negative / total * 100).toFixed(1) : 0;
            const neutralPercent = total > 0 ? (neutral / total * 100).toFixed(1) : 0;
            
            const sentimentCard = document.getElementById('sentimentCard');
            sentimentCard.classList.remove('hidden');
            sentimentCard.innerHTML = `
                <div class="flex items-start gap-4">
                    <div class="w-12 h-12 bg-purple-100 rounded-xl flex items-center justify-center">
                        <i class="fas fa-robot text-purple-600 text-xl"></i>
                    </div>
                    <div class="flex-1">
                        <h3 class="font-bold text-gray-800 mb-2">🤖 تحليل المشاعر بالذكاء الاصطناعي</h3>
                        <div class="grid grid-cols-3 gap-3 mb-3">
                            <div class="text-center p-2 bg-green-50 rounded-lg"><div class="text-lg font-bold text-green-600">${positivePercent}%</div><div class="text-xs text-gray-600">😊 إيجابي</div><div class="text-xs text-gray-500">${positive} رد</div></div>
                            <div class="text-center p-2 bg-yellow-50 rounded-lg"><div class="text-lg font-bold text-yellow-600">${neutralPercent}%</div><div class="text-xs text-gray-600">😐 محايد</div><div class="text-xs text-gray-500">${neutral} رد</div></div>
                            <div class="text-center p-2 bg-red-50 rounded-lg"><div class="text-lg font-bold text-red-600">${negativePercent}%</div><div class="text-xs text-gray-600">😞 سلبي</div><div class="text-xs text-gray-500">${negative} رد</div></div>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-2">
                            <div class="bg-green-500 h-2 rounded-full" style="width: ${positivePercent}%"></div>
                        </div>
                    </div>
                </div>
            `;
        }
    } catch (error) {
        console.error('Batch sentiment error:', error);
    }
}
        
        function renderResponses(responses) {
            const container = document.getElementById('responsesContainer');
            container.innerHTML = responses.map((response, idx) => `
                <div class="response-card p-5">
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-gradient-to-br from-[#C4E2F5] to-[#E8F4FD] rounded-full flex items-center justify-center">
                                <span class="font-bold text-[#2C5EAD]">${idx + 1}</span>
                            </div>
                            <div>
                                <p class="font-semibold text-gray-800">${escapeHtml(response.respondent_name || 'مجهول')}</p>
                                <p class="text-xs text-gray-500">${new Date(response.submitted_at).toLocaleString('ar-EG')}</p>
                            </div>
                        </div>
                        <button onclick="showResponseDetail(${response.id})" class="text-[#1591DC] hover:text-[#2C5EAD] text-sm">
                            <i class="fas fa-eye ml-1"></i> تفاصيل
                        </button>
                    </div>
                    <div class="space-y-2">
                        ${(response.answers || []).slice(0, 2).map(answer => `
                            <div class="answer-item">
                                <p class="text-xs text-gray-500 mb-1">${escapeHtml(answer.question?.question_text || 'سؤال')}</p>
                                <p class="text-sm text-gray-700">${escapeHtml(answer.answer_value || '-')}</p>
                            </div>
                        `).join('')}
                        ${(response.answers || []).length > 2 ? `<p class="text-xs text-gray-400 text-center">+${response.answers.length - 2} إجابات أخرى</p>` : ''}
                    </div>
                </div>
            `).join('');
        }
        
        function showResponseDetail(responseId) {
            const response = currentResponses.find(r => r.id === responseId);
            if (!response) return;
            
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = `
                <div class="space-y-4">
                    <div class="bg-gray-50 p-3 rounded-lg">
                        <p class="text-sm text-gray-500">المجيب</p>
                        <p class="font-semibold">${escapeHtml(response.respondent_name || 'مجهول')}</p>
                        ${response.respondent_email ? `<p class="text-sm text-gray-600">${escapeHtml(response.respondent_email)}</p>` : ''}
                    </div>
                    <div class="bg-gray-50 p-3 rounded-lg">
                        <p class="text-sm text-gray-500">تاريخ الإرسال</p>
                        <p>${new Date(response.submitted_at).toLocaleString('ar-EG')}</p>
                    </div>
                    <div class="border-t pt-3">
                        <p class="font-semibold text-gray-800 mb-2">الإجابات:</p>
                        <div class="space-y-3">
                            ${(response.answers || []).map(answer => `
                                <div class="bg-gray-50 p-2 rounded-lg">
                                    <p class="text-xs text-gray-500">${escapeHtml(answer.question?.question_text || 'سؤال')}</p>
                                    <p class="text-sm">${escapeHtml(answer.answer_value || '-')}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('responseModal').classList.add('active');
        }
        
        async function exportResponses() {
            if (!currentSurveyId) return;
            showToast('جاري تصدير البيانات...', true);
            try {
                const response = await fetch(API_BASE + `/export/survey/${currentSurveyId}`, {
                    headers: { 'Authorization': 'Bearer ' + token() }
                });
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `responses-${currentSurveyId}.xlsx`;
                a.click();
                URL.revokeObjectURL(url);
                showToast('✓ تم تصدير البيانات بنجاح', true);
            } catch (error) {
                showToast('✗ فشل التصدير', false);
            }
        }
        
        function closeModal() { document.getElementById('responseModal').classList.remove('active'); }
        
        // Search surveys
        document.getElementById('surveySearchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allSurveys.filter(s => (s.title || '').toLowerCase().includes(term));
            renderSurveysList(filtered);
        });
        
        // Initial load
        const currentUser = user();
        if (currentUser) document.getElementById('adminName').textContent = currentUser.name || 'Admin';
        loadSurveys();

        function showSkeletonLoading() {
    document.getElementById('surveysList').innerHTML = `
        <div class="col-span-full">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                ${Array(4).fill(0).map(() => `
                    <div class="bg-white rounded-xl p-4">
                        <div class="flex items-center gap-3">
                            <div class="skeleton skeleton-avatar w-10 h-10 rounded-xl"></div>
                            <div class="flex-1">
                                <div class="skeleton skeleton-title w-32"></div>
                                <div class="skeleton skeleton-text w-24 mt-1"></div>
                            </div>
                        </div>
                    </div>
                `).join('')}
            </div>
        </div>
    `;
}

function refreshData() {
    showToast('جاري تحديث البيانات...', true);
    loadSurveys();
    if (currentSurveyId) {
        loadResponses(currentSurveyId);
    }
}

    </script>
</body>
</html>
