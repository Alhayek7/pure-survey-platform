<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, height=device-height, viewport-fit=cover">
    <title>الإجابة على استبيان | PURE Survey 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #C4E2F5 0%, #E8F4FD 100%);
            min-height: 100vh;
        }
        
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(75, 184, 250, 0.06);
            animation: floatBg 25s infinite;
        }
        
        @keyframes floatBg {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            25% { transform: translate(50px, -50px) scale(1.2); opacity: 0.5; }
            50% { transform: translate(-40px, 40px) scale(0.85); opacity: 0.4; }
            75% { transform: translate(40px, 50px) scale(1.1); opacity: 0.45; }
        }
        
        .header {
            background: rgba(44, 94, 173, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        
        .question-card {
            background: white;
            border-radius: 1.25rem;
            transition: all 0.3s ease;
            border: 1px solid #E2E8F0;
            overflow: hidden;
        }
        
        .question-card:hover {
            transform: translateX(-5px);
            box-shadow: 0 10px 30px -10px rgba(44, 94, 173, 0.1);
            border-color: #C4E2F5;
        }
        
        .question-number {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #2C5EAD, #1591DC);
            color: white;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #2C5EAD, #1591DC);
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -6px rgba(44, 94, 173, 0.5);
        }
        
        .btn-outline {
            border: 1.5px solid #1591DC;
            color: #1591DC;
            background: white;
            transition: all 0.3s;
        }
        
        .btn-outline:hover {
            background: linear-gradient(135deg, #2C5EAD, #1591DC);
            color: white;
        }
        
        .input-field, select, textarea {
            transition: all 0.3s;
            border: 2px solid #E2E8F0;
            background: #F8FAFE;
            border-radius: 0.75rem;
            padding: 10px 14px;
            width: 100%;
        }
        
        .input-field:focus, select:focus, textarea:focus {
            border-color: #4BB8FA;
            background: white;
            box-shadow: 0 0 0 3px rgba(75, 184, 250, 0.15);
            outline: none;
        }
        
        .rating-stars {
            display: flex;
            gap: 8px;
            flex-direction: row-reverse;
            justify-content: flex-end;
        }
        
        .rating-stars i {
            cursor: pointer;
            font-size: 28px;
            color: #CBD5E1;
            transition: all 0.2s;
        }
        
        .rating-stars i:hover,
        .rating-stars i.active {
            color: #FBBF24;
        }
        
        .option-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 10px;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .option-item:hover {
            background: #F8FAFE;
        }
        
        .toast {
            position: fixed;
            top: 90px;
            left: 20px;
            z-index: 1100;
            animation: slideRight 0.3s ease-out;
        }
        
        @keyframes slideRight {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #C4E2F5;
            border-top-color: #2C5EAD;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .progress-bar {
            height: 6px;
            background: #E2E8F0;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2C5EAD, #1591DC);
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #C4E2F5; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #2C5EAD, #1591DC); border-radius: 10px; }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in-up {
            animation: fadeInUp 0.4s ease-out forwards;
        }
    </style>
</head>
<body>
    <div class="bg-animation" id="bgAnimation"></div>
    
    <header class="header text-white">
        <div class="container mx-auto px-6 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center backdrop-blur-sm">
                        <i class="fas fa-chart-line text-white text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold tracking-tight">PURE Survey</h1>
                        <p class="text-xs text-white/70">الإجابة على استبيان</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2 bg-white/10 backdrop-blur-sm px-3 py-1.5 rounded-lg">
                        <i class="fas fa-user text-sm"></i>
                        <span class="text-sm" id="userName">Loading...</span>
                    </div>
                    <button onclick="location.href='dashboard.html'" class="bg-white/10 hover:bg-white/20 backdrop-blur-sm px-3 py-1.5 rounded-lg text-sm transition">
                        <i class="fas fa-arrow-right ml-1"></i> العودة
                    </button>
                </div>
            </div>
        </div>
    </header>
    
    <main class="relative z-10 container mx-auto px-6 py-8">
        <div class="max-w-3xl mx-auto">
            <!-- Survey Info -->
            <div id="surveyInfo" class="bg-white rounded-2xl p-6 shadow-sm mb-6 fade-in-up"></div>
            
            <!-- Progress -->
            <div class="bg-white rounded-2xl p-4 mb-6 fade-in-up hidden" id="progressSection">
                <div class="flex justify-between text-sm text-gray-600 mb-2">
                    <span>📊 تقدم الإجابة</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>
            
            <!-- Respondent Info -->
            <div class="bg-white rounded-2xl p-5 mb-6 fade-in-up">
                <h3 class="font-semibold text-gray-800 mb-3 flex items-center gap-2">
                    <i class="fas fa-user-circle text-[#1591DC]"></i> معلومات المجيب
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">الاسم <span class="text-red-500">*</span></label>
                        <input type="text" id="respondent_name" class="input-field" placeholder="أدخل اسمك">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">البريد الإلكتروني (اختياري)</label>
                        <input type="email" id="respondent_email" class="input-field" placeholder="example@domain.com">
                    </div>
                </div>
            </div>
            
            <!-- Questions Container -->
            <form id="answerForm" class="space-y-5">
                <div id="questionsContainer" class="space-y-4"></div>
                
                <div class="flex gap-4 mt-6">
                    <button type="submit" id="submitBtn" class="btn-primary text-white px-6 py-3 rounded-xl flex-1 font-semibold text-lg">
                        <i class="fas fa-paper-plane ml-2"></i> إرسال الإجابات
                    </button>
                    <button type="button" onclick="location.href='dashboard.html'" class="btn-outline px-6 py-3 rounded-xl flex-1 font-semibold text-lg">
                        <i class="fas fa-times ml-2"></i> إلغاء
                    </button>
                </div>
            </form>
        </div>
    </main>
    
    <script src="js/api.js"></script>
    <script src="js/survey.js"></script>
</body>
</html>
