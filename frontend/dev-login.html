<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول سريع - للمطورين</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .role-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .role-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="container mx-auto px-4 py-12">
        <div class="max-w-4xl mx-auto">
            <div class="text-center mb-10">
                <h1 class="text-4xl font-bold text-gray-800 mb-2">🚀 تسجيل دخول سريع</h1>
                <p class="text-gray-600">اختر دوراً للدخول مباشرة إلى المنصة (لأغراض التطوير)</p>
            </div>
            
            <div class="grid md:grid-cols-3 gap-6">
                <!-- Admin Card -->
                <div class="role-card bg-white rounded-xl shadow-lg overflow-hidden" onclick="quickLogin('admin@example.com', 'admin123')">
                    <div class="bg-red-600 p-4 text-center">
                        <div class="text-4xl mb-2">👑</div>
                        <h3 class="text-white font-bold text-xl">مدير النظام</h3>
                    </div>
                    <div class="p-4 text-center">
                        <p class="text-gray-600 text-sm">صلاحية كاملة</p>
                        <p class="text-gray-500 text-xs mt-2">admin@example.com</p>
                        <button class="mt-3 bg-red-600 text-white px-4 py-1 rounded-lg text-sm">تسجيل الدخول →</button>
                    </div>
                </div>
                
                <!-- Researcher Card -->
                <div class="role-card bg-white rounded-xl shadow-lg overflow-hidden" onclick="quickLogin('researcher@example.com', 'researcher123')">
                    <div class="bg-blue-600 p-4 text-center">
                        <div class="text-4xl mb-2">🔬</div>
                        <h3 class="text-white font-bold text-xl">باحث</h3>
                    </div>
                    <div class="p-4 text-center">
                        <p class="text-gray-600 text-sm">إنشاء وإدارة الاستبيانات</p>
                        <p class="text-gray-500 text-xs mt-2">researcher@example.com</p>
                        <button class="mt-3 bg-blue-600 text-white px-4 py-1 rounded-lg text-sm">تسجيل الدخول →</button>
                    </div>
                </div>
                
                <!-- User Card -->
                <div class="role-card bg-white rounded-xl shadow-lg overflow-hidden" onclick="quickLogin('user@example.com', 'user123')">
                    <div class="bg-green-600 p-4 text-center">
                        <div class="text-4xl mb-2">👤</div>
                        <h3 class="text-white font-bold text-xl">مستخدم عادي</h3>
                    </div>
                    <div class="p-4 text-center">
                        <p class="text-gray-600 text-sm">الإجابة على الاستبيانات</p>
                        <p class="text-gray-500 text-xs mt-2">user@example.com</p>
                        <button class="mt-3 bg-green-600 text-white px-4 py-1 rounded-lg text-sm">تسجيل الدخول →</button>
                    </div>
                </div>
            </div>
            
            <div class="mt-8 text-center">
                <a href="index.html" class="text-gray-600 hover:text-gray-800">← العودة إلى صفحة تسجيل الدخول العادية</a>
            </div>
        </div>
    </div>
    
    <script src="js/api.js"></script>
    <script>
        async function quickLogin(email, password) {
            const btn = event.target.closest('button');
            const originalText = btn?.textContent;
            if(btn) {
                btn.textContent = 'جاري...';
                btn.disabled = true;
            }
            
            try {
                const response = await api('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ email, password })
                });
                
                setSession(response);
                
                const role = response.user.role;
                let redirect = 'dashboard.html';
                if(role === 'admin') redirect = 'admin.html';
                else if(role === 'researcher') redirect = 'researcher.html';
                
                window.location.href = redirect;
            } catch(err) {
                alert('فشل تسجيل الدخول: ' + err.message);
                if(btn) {
                    btn.textContent = originalText;
                    btn.disabled = false;
                }
            }
        }
    </script>
</body>
</html>
