<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, height=device-height, viewport-fit=cover">
    <title>لوحة الباحث | PURE Survey 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #C4E2F5 0%, #E8F4FD 100%);
            min-height: 100vh;
        }
        
        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(75, 184, 250, 0.06);
            animation: floatBg 25s infinite;
        }
        
        @keyframes floatBg {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            25% { transform: translate(50px, -50px) scale(1.2); opacity: 0.5; }
            50% { transform: translate(-40px, 40px) scale(0.85); opacity: 0.4; }
            75% { transform: translate(40px, 50px) scale(1.1); opacity: 0.45; }
        }
        
        /* Sidebar */
        .sidebar {
            background: linear-gradient(180deg, #2C5EAD 0%, #1591DC 100%);
            transition: all 0.3s;
        }
        
        .sidebar-link {
            transition: all 0.3s;
            border-radius: 0.75rem;
        }
        
        .sidebar-link:hover, .sidebar-link.active {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(-5px);
        }
        
        .main-content {
            overflow-y: auto;
            scrollbar-width: thin;
        }
        
        .main-content::-webkit-scrollbar { width: 5px; }
        .main-content::-webkit-scrollbar-track { background: #C4E2F5; border-radius: 10px; }
        .main-content::-webkit-scrollbar-thumb { background: #1591DC; border-radius: 10px; }
        
        /* Stat Cards */
        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            transition: all 0.3s;
            border: 1px solid rgba(196, 226, 245, 0.5);
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px -15px rgba(44, 94, 173, 0.2);
        }
        
        /* Survey Card */
        .survey-card {
            background: white;
            border-radius: 1rem;
            transition: all 0.3s;
            border: 1px solid #E2E8F0;
            overflow: hidden;
        }
        
        .survey-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px -10px rgba(44, 94, 173, 0.15);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #2C5EAD, #1591DC);
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -6px rgba(44, 94, 173, 0.5);
        }
        
        .btn-outline {
            border: 1.5px solid #1591DC;
            color: #1591DC;
            background: white;
            transition: all 0.3s;
        }
        
        .btn-outline:hover {
            background: linear-gradient(135deg, #2C5EAD, #1591DC);
            color: white;
        }
        
        .badge-published {
            background: #C4E2F5;
            color: #2C5EAD;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        .badge-draft {
            background: #FEF3C7;
            color: #D97706;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        .avatar {
            background: linear-gradient(135deg, #C4E2F5, #4BB8FA);
        }
        
        .toast {
            position: fixed;
            top: 90px;
            left: 20px;
            z-index: 1100;
            animation: slideRight 0.3s ease-out;
        }
        
        @keyframes slideRight {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #C4E2F5;
            border-top-color: #2C5EAD;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in-up {
            animation: fadeInUp 0.4s ease-out forwards;
        }
    </style>
</head>
<body>
    <div class="bg-animation" id="bgAnimation"></div>
    
    <div class="flex h-screen w-screen relative z-10">
        <!-- Sidebar -->
        <aside class="sidebar w-72 flex-shrink-0 text-white shadow-2xl">
            <div class="p-6">
                <div class="flex items-center gap-3 mb-8 pb-4 border-b border-white/20">
                    <div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center backdrop-blur-sm">
                        <i class="fas fa-chart-line text-white text-2xl"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold tracking-tight">PURE Survey</h1>
                        <p class="text-xs text-white/70 mt-1">لوحة الباحث</p>
                    </div>
                </div>
                
                <div class="bg-white/10 backdrop-blur-sm rounded-xl p-4 mb-8">
                    <div class="flex items-center gap-3">
                        <div class="avatar w-12 h-12 bg-white/20 rounded-full flex items-center justify-center">
                            <i class="fas fa-microscope text-xl"></i>
                        </div>
                        <div class="flex-1">
                            <p class="font-bold text-sm" id="researcherName">Researcher</p>
                            <p class="text-xs text-white/70">باحث</p>
                        </div>
                        <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                    </div>
                </div>
                
                <nav class="space-y-1.5">
                    <a href="#" onclick="showDashboard(); return false;" data-page="dashboard" class="sidebar-link active flex items-center gap-3 px-4 py-3 text-sm font-medium">
                        <i class="fas fa-tachometer-alt w-5 text-lg"></i>
                        <span>لوحة التحكم</span>
                    </a>
                    <a href="#" onclick="location.href='researcher-surveys.html'" class="sidebar-link flex items-center gap-3 px-4 py-3 text-sm font-medium">
                        <i class="fas fa-poll w-5 text-lg"></i>
                        <span>استبياناتي</span>
                    </a>
                    <a href="#" onclick="location.href='researcher-create.html'" class="sidebar-link flex items-center gap-3 px-4 py-3 text-sm font-medium">
                        <i class="fas fa-plus w-5 text-lg"></i>
                        <span>استبيان جديد</span>
                    </a>
                    <a href="role-dashboard.html" class="sidebar-link flex items-center gap-3 px-4 py-3 text-sm font-medium">
                        <i class="fas fa-chart-pie w-5 text-lg"></i>
                        <span>لوحة الأدوار والبيانات</span>
                    </a>
                    <a href="#" onclick="location.href='researcher-export.html'" class="sidebar-link flex items-center gap-3 px-4 py-3 text-sm font-medium">
                        <i class="fas fa-file-export w-5 text-lg"></i>
                        <span>تصدير البيانات</span>
                    </a>
                </nav>
                
                <div class="absolute bottom-6 w-60">
                    <div class="border-t border-white/20 pt-4">
                        <a href="#" onclick="logout()" class="sidebar-link flex items-center gap-3 px-4 py-3 text-sm font-medium text-white/80 hover:text-white">
                            <i class="fas fa-sign-out-alt w-5 text-lg"></i>
                            <span>تسجيل الخروج</span>
                        </a>
                    </div>
                </div>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content flex-1 p-6 overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-2xl font-bold text-gray-800" id="pageTitle">لوحة التحكم</h1>
                    <p class="text-sm text-gray-500 mt-1" id="pageSubtitle">مرحباً بك في لوحة الباحث</p>
                </div>
                <div class="flex items-center gap-3">
                    <div class="bg-white px-4 py-2 rounded-xl shadow-sm">
                        <i class="fas fa-calendar-alt text-[#4BB8FA] ml-2"></i>
                        <span class="text-sm text-gray-600" id="currentDate"></span>
                    </div>
                </div>
            </div>
            
            <div id="dashboardContent">
                <!-- Stats Cards -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-5 mb-6">
                    <div class="stat-card p-5 text-center">
                        <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center mx-auto mb-3">
                            <i class="fas fa-poll text-[#2C5EAD] text-xl"></i>
                        </div>
                        <p class="text-2xl font-bold text-gray-800" id="totalSurveys">0</p>
                        <p class="text-sm text-gray-500">إجمالي الاستبيانات</p>
                    </div>
                    <div class="stat-card p-5 text-center">
                        <div class="w-12 h-12 bg-green-50 rounded-xl flex items-center justify-center mx-auto mb-3">
                            <i class="fas fa-chart-line text-[#1591DC] text-xl"></i>
                        </div>
                        <p class="text-2xl font-bold text-gray-800" id="totalResponses">0</p>
                        <p class="text-sm text-gray-500">إجمالي الردود</p>
                    </div>
                    <div class="stat-card p-5 text-center">
                        <div class="w-12 h-12 bg-purple-50 rounded-xl flex items-center justify-center mx-auto mb-3">
                            <i class="fas fa-check-circle text-[#4BB8FA] text-xl"></i>
                        </div>
                        <p class="text-2xl font-bold text-gray-800" id="publishedCount">0</p>
                        <p class="text-sm text-gray-500">منشور</p>
                    </div>
                    <div class="stat-card p-5 text-center">
                        <div class="w-12 h-12 bg-yellow-50 rounded-xl flex items-center justify-center mx-auto mb-3">
                            <i class="fas fa-chart-pie text-[#D97706] text-xl"></i>
                        </div>
                        <p class="text-2xl font-bold text-gray-800" id="completionRate">0%</p>
                        <p class="text-sm text-gray-500">نسبة الاستجابة</p>
                    </div>
                </div>
                
                <!-- Chart -->
                <div class="bg-white rounded-xl p-5 shadow-sm mb-6">
                    <h3 class="font-semibold text-gray-800 mb-3">نشاط استبياناتي</h3>
                    <canvas id="surveysChart" height="200"></canvas>
                </div>
                
                <!-- Recent Surveys -->
                <div class="bg-white rounded-xl shadow-sm">
                    <div class="flex justify-between items-center p-5 border-b">
                        <h3 class="font-semibold text-gray-800">أحدث استبياناتي</h3>
                        <button onclick="location.href='researcher-surveys.html'" class="text-sm text-[#1591DC] hover:text-[#2C5EAD]">عرض الكل ←</button>
                    </div>
                    <div id="recentSurveys" class="divide-y divide-gray-100"></div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="js/api.js"></script>
    <script>
        let surveysChart = null;
        
        function createBackgroundCircles() {
            const container = document.getElementById('bgAnimation');
            for (let i = 0; i < 20; i++) {
                const circle = document.createElement('div');
                circle.classList.add('bg-circle');
                const size = Math.random() * 200 + 80;
                circle.style.width = size + 'px';
                circle.style.height = size + 'px';
                circle.style.left = Math.random() * 100 + '%';
                circle.style.top = Math.random() * 100 + '%';
                circle.style.animationDelay = Math.random() * 25 + 's';
                circle.style.animationDuration = Math.random() * 20 + 15 + 's';
                container.appendChild(circle);
            }
        }
        createBackgroundCircles();
        
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('ar-EG');
        
        function showToast(text, isSuccess) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            const bgColor = isSuccess ? '#10B981' : '#EF4444';
            toast.innerHTML = `<div class="flex items-center gap-3 bg-white rounded-xl shadow-lg p-3 border-r-4" style="border-right-color: ${bgColor}"><i class="fas ${isSuccess ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i><span class="text-gray-700 text-sm">${text}</span></div>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        async function loadDashboard() {
            try {
                const surveys = await api('/surveys/my');
                
                const total = surveys.length;
                const published = surveys.filter(s => s.status === 'published').length;
                let totalResponses = 0;
                surveys.forEach(s => totalResponses += s.responses?.length || 0);
                const completionRate = total > 0 ? Math.round((totalResponses / (total * 10)) * 100) : 0;
                
                document.getElementById('totalSurveys').textContent = total;
                document.getElementById('totalResponses').textContent = totalResponses;
                document.getElementById('publishedCount').textContent = published;
                document.getElementById('completionRate').textContent = completionRate + '%';
                
                // Chart
                const months = ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو'];
                const chartData = [total, total + 2, total + 5, total + 8, total + 12, total + 15];
                const ctx = document.getElementById('surveysChart')?.getContext('2d');
                if (ctx) {
                    if (surveysChart) surveysChart.destroy();
                    surveysChart = new Chart(ctx, {
                        type: 'line',
                        data: { labels: months, datasets: [{ label: 'استبياناتي', data: chartData, borderColor: '#2C5EAD', backgroundColor: '#C4E2F5', tension: 0.4, fill: true }] },
                        options: { responsive: true, maintainAspectRatio: true }
                    });
                }
                
                // Recent surveys
                const recentSurveys = surveys.slice(-5).reverse();
                document.getElementById('recentSurveys').innerHTML = recentSurveys.map(s => `
                    <div class="p-4 flex justify-between items-center hover:bg-gray-50 transition">
                        <div>
                            <h4 class="font-medium text-gray-800">${s.title || 'بدون عنوان'}</h4>
                            <div class="flex gap-3 mt-1">
                                <span class="${s.status === 'published' ? 'badge-published' : 'badge-draft'} text-xs">${s.status === 'published' ? 'منشور' : 'مسودة'}</span>
                                <span class="text-xs text-gray-400">${s.responses?.length || 0} ردود</span>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editSurvey(${s.id})" class="text-[#1591DC] hover:text-[#2C5EAD]"><i class="fas fa-edit"></i></button>
                            <button onclick="viewResponses(${s.id})" class="text-[#4BB8FA] hover:text-[#1591DC]"><i class="fas fa-chart-bar"></i></button>
                        </div>
                    </div>
                `).join('');
                
                const currentUser = user();
                if (currentUser) document.getElementById('researcherName').textContent = currentUser.name || 'Researcher';
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }
        
        function editSurvey(id) { window.location.href = `researcher-edit.html?id=${id}`; }
        function viewResponses(id) { window.location.href = `researcher-responses.html?id=${id}`; }
        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
        
        function showDashboard() { loadDashboard(); }
        
        requireRole('researcher');
        loadDashboard();
    </script>
</body>
</html>
