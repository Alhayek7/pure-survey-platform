<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Edit Survey - PURE Survey Platform</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="css/style.css"></head><body><main class="shell"><script src="js/api.js"></script><script>nav()</script><h1 class="text-2xl font-bold mb-4">Edit Survey</h1><div id="message"></div><section class="panel mb-4"><p>Status: <span id="statusText" class="badge"></span></p></section><form class="space-y-4" onsubmit="return false"><section class="panel space-y-3"><input id="title" class="input" placeholder="Survey title"><textarea id="description" class="input" placeholder="Description"></textarea><label><input id="is_public" type="checkbox" checked> Public</label></section><div id="questions" class="space-y-3"></div><button id="addQuestion" type="button" class="btn secondary">Add Question</button><button id="save" type="button" class="btn">Save</button><button id="publish" type="button" class="btn secondary">Publish</button><button id="close" type="button" class="btn danger">Close</button></form></main><script src="js/create-survey.js"></script><script src="js/edit-survey.js"></script></body></html>
